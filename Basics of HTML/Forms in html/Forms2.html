<!DOCTYPE html>
<html>
    <head>
        <title>Forms in html</title>
    </head>
    <body>
        <form>
            <fieldset>
                <!-- The fieldset tag is used to group related elements in a form and draws a box around them-->
                 <legend>Personal Information:</legend>
                 <label>Full Name:</label>
                 <!--placeholder sttribute can be used to provide extra information about entry to be made.-->
                 <input type="text" id="frame" placeholder="Enter Name"><br><br>
                 <label>Email:</label>
                 <input type="text" id="email"><br><br>
                 <label>Gender</label><br>
                 <input type="radio" id="gender"
                 value="female">Female<br>
                 <input type="radio" id="gender" value="male">Male<br><br>
                 <label>Birthday:</label>
                 <input type="date" id="birthday" name="birthday"><br>
                 <input type="text" id="name"><br><br>
                 <label>Enter Marks:</label><br>
                 <select name="subject" id="subject">
                    <option value="Maths">Maths</option>
                    <option value="English">English</option>
                    <option value="Science">Science</option>
                 </select>
                 <input type="number" id="m1" name="m1"><br><br>
                 <select name="Subject 2" id="Subject 2">
                    <option value="Maths">Maths</option>
                    <option value="English">English</option>
                    <option value="Science">Science</option>
                 </select>
                 <input type="number" id="m2" name="m2"><br><br>
                 <select name="Subject3" id="Subject3">
                    <option value="Maths">Maths</option>
                    <option value="English"> English</option>
                    <option value="Science">Science</option>
                 </select>
                 <input type="number" id="m3" name="m3"><br><br>
                 Average: <output name="x" for="m1 m2 m3"></output>
            </fieldset>
        </form>
    </body>
</html>
