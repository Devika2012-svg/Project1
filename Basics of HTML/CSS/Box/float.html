<!DOCTYPE html>
<html>
    <head>
        <title>Float in CSS</title>
        <style>
            img#LavenderRight{
                float:right;
            }
            img#LavenderLeft{
                float:left;
            }
        </style>
    </head>
    <body>
        <h2>Float Right</h2>
        <p>In this example, the image will float to the right in the paragraph, and the text in the paragraph will wrap around the image.</p>
        <p> 
        <img id="LavenderLeft"
        src="Lavender.avif" alt="flowers" style="width:100px; height:100px;">
        <img id="LavenderRight"
         src="Lavender.avif" alt="flowers" style="width:100px; height:100px;">
            This is a dummy content used to understand float property.
        </p>
    </body>
</html>
