<!DOCTYPE html>
<html>
    <head>
        <title>Class Inheritance</title>
    </head>
    <body>
        <h1>JavaScript Inheritance</h1>
        <p>Uses the "extends" keyword to inherit all methods from another class.</p>
        <p>Uses the "super" method to call all the parent's constructor function.</p>
        <p id="details"></p>
        <script>
            class car {
                constructor(brand) {
                    this.carname = brand;
                }
                present() {
                    return 'I have a ' + this.carname;
                }
              }

              class Model extends car {
                constructor(brand, mod) {
                    super(brand);
                    this.model = mod;
                }

                show() {
                    return this.present() + ', it is a ' + this.model;
                }
              }

              let myCar = new Model("Ford", "Mustang");
              document.getElementById("details").innerHTML = myCar.show();
        </script>
    </body>
</html>
