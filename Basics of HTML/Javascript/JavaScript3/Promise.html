<!DOCTYPE html>
<html>
    <body>

        <h3>JavaScript Promise</h3>

        <p id="demo"></p>

        <script>
            function myDisplayer(some) {
                document.getElementById("demo").innerHTML = some;
            }

            function sum(a,b) {
                var sum = a + b;
                myDisplayer(sum);
            }

            let myPromise = new Promise(function(myResolve, myReject) {
                let x = 0; //some code (try to change x to 5)

                if (x == 0) {
                    myResolve("OK") // when successfull
                    myReject("Error") // when error
                }
            });

            //consuming code - must wait for fullfilled promise 
            myPromise.then(
                function(value) { sum(5,5); }, //code successfull
                function(error) { sum(error); } // code has error
            );
        </script>
    </body>
</html>
