<html>

        <title>Regular Expressions</title>

    <body>
        <h2>JavaScript string methods</h2>
        <p>Basic Methods</p>
        <script>
            var str ="AmAzInG"
            document.write(str.toUpperCase());
            document.write("<br>");
            document.write(str.toLowerCase());
            document.write("<br>");
            document.write(str.startsWith('A'));
            document.write("<br>");

            // Test method -> returns true or false
            var str1 = "I learnt about new Methods";
            var patt = new RegExp("about");
            var res = patt.test(str);
            document.write(res);

        </script>
    </body>
