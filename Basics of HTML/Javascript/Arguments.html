<!DOCTYPE html>
<html>
    <head>
        <title>Arguments</title>
        <style>
            body {
                color:rgb(18, 41, 84);
            }
        </style>
    </head>
    <body>
    <p>Finding the largest number with the help of Argument Objects.</p>            
    <p id="result"></p>
    <script>
        function findMax (){
            var i;
            var max = 0;
            for(i = 0; i < arguments.length; i++){
                if (arguments[i] > max) {
                    max = arguments[i];
                }
            }
            return max;
        }

        document.getElementById("result").innerHTML = findMax(7, 8, 3, 5);
    </script>
    </body>
</html>
