<!DOCTYPE html>
<html>
    <head>
        <title>Fuctions in html</title>
    </head>
    <body>
        <button onclick="myfunction(5,3)"> Execute JS Function</button>
        <script>
            function myfunction(x,y)
            {
                if (y=== undefined) {
                    y=2;
                }
                document.write(x*y);
            }
        </script>
    </body>
</html>
