<!DOCTYPE html>
<html>
    <head>
        <title>bootstrap Example</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    </head>
    <body>
        <div class="container">
            <h2>Carousel Example</h2>
            <div id="carouselExample" class="carousel slide">
                <!-- Indicators -->

                 
                 <!-- Wrapper for slides -->
                 <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img class="d-block w-100" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQR7dPypEMq1E5SMENYSz30tdIkUVoiaR0tPA&s" alt="flowers">
                    </div>
                    <div class="carousel-item">
                        <img class="d-block w-100" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRmpbCPtkSGZFqyIA4WL9LLLCgjCNp8Pdnbrg&s" alt="roses">
                    </div>
                    <div class="carousel-item">
                        <img class="d-block w-100" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQgZ47IY605UB8PhT8-bwZVdYs7z5looANwVg&s" alt="lilies">
                    </div>
                    <div class="carousel-item">
                        <img class="d-block w-100" src="https://www.bhg.com/thmb/dlKLbrzxqX_H2viaMAwCdq8bo20=/1280x0/filters:no_upscale():strip_icc()/endless-summer-blue-hydrangea-macrophylla-c38f20fe-da0331cb73c94b9db10b6bf74e098356.jpg" alt="blueflowers">
                    </div>
                    <div class="carousel-item">
                        <img class="d-block w-100" src="https://cdn.shopify.com/s/files/1/1634/9541/files/Lavender_079d15dd-5740-4434-bf4f-51f467abf2c5_1024x1024.png?v=1646353494" alt="lavender">
                    </div>
                <!-- </div> -->
            </div>
                 <!-- Left and right carousels -->
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>

                <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
        </div>
    </body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js
"></script>
</html>
